spring:
  application:
    name: ai-hr-management
  datasource:
    url: jdbc:postgresql://localhost:5432/hr_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8085

openai:
  api:
    key: ${OPENAI_API_KEY}
    model: gpt-4

logging:
  level:
    com.pcveldi: DEBUG
